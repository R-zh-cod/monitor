<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生选择模拟器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f4ecd8; --paper-dark: #e8dcc0; --ink: #2b2b2b; --ink-light: #5a5a5a;
  --seal: #8b2c2c; --gold: #a88647; --gold-light: #c9a961; --shadow: rgba(43,27,12,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Serif SC', serif; background: var(--paper); color: var(--ink); min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(168,134,71,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(139,44,44,0.05) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,100,50,0.02) 2px, rgba(139,100,50,0.02) 4px);
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
}
#app { position: relative; z-index: 2; min-height: 100vh; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes titleIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.start-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; text-align: center; }
.start-title { font-family: 'Ma Shan Zheng', serif; font-size: clamp(48px,8vw,96px); color: var(--ink); margin-bottom: 16px; letter-spacing: 0.1em; text-shadow: 2px 2px 0 rgba(168,134,71,0.2); animation: titleIn 1s ease both; }
.start-subtitle { font-size: 18px; color: var(--ink-light); margin-bottom: 60px; font-style: italic; max-width: 540px; line-height: 1.9; animation: fadeIn 1.2s ease 0.3s both; }
.start-cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 24px; max-width: 720px; width: 100%; animation: fadeIn 1.2s ease 0.6s both; }
.start-card { background: rgba(255,252,240,0.6); border: 1px solid var(--gold); border-radius: 4px; padding: 32px 20px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(2px); }
.start-card:hover { background: rgba(255,252,240,0.95); transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); border-color: var(--seal); }
.start-card-icon { font-size: 32px; margin-bottom: 12px; color: var(--seal); }
.start-card-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.start-card-desc { font-size: 13px; color: var(--ink-light); line-height: 1.7; }

.game-page { display: grid; grid-template-columns: 280px 1fr; gap: 24px; max-width: 1200px; margin: 0 auto; padding: 24px; min-height: 100vh; }
.status-panel { background: rgba(255,252,240,0.55); border: 1px solid var(--gold); border-radius: 4px; padding: 20px; position: sticky; top: 24px; height: fit-content; max-height: calc(100vh - 48px); overflow-y: auto; }
.status-section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px dashed rgba(168,134,71,0.3); }
.status-section:last-child { border-bottom: none; margin-bottom: 0; }
.status-label { font-size: 11px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; }
.fate-seal { display: inline-block; padding: 6px 16px; background: var(--seal); color: var(--paper); font-family: 'Ma Shan Zheng', serif; font-size: 20px; border-radius: 2px; transform: rotate(-2deg); box-shadow: 2px 2px 0 rgba(0,0,0,0.12); }
.family-name { font-size: 16px; font-weight: 500; }
.attr-list { display: flex; flex-direction: column; gap: 7px; }
.attr-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.attr-name { width: 36px; color: var(--ink-light); }
.attr-bar { flex: 1; height: 6px; background: rgba(168,134,71,0.2); border-radius: 3px; overflow: hidden; }
.attr-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.5s ease; }
.attr-value { width: 26px; text-align: right; font-variant-numeric: tabular-nums; }
.trait-list { display: flex; flex-wrap: wrap; gap: 6px; }
.trait-badge { display: inline-block; padding: 3px 9px; background: rgba(168,134,71,0.15); border: 1px solid var(--gold); border-radius: 12px; font-size: 11px; cursor: help; }
.trait-badge.innate { background: rgba(139,44,44,0.1); border-color: var(--seal); color: var(--seal); }
.status-meta { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
.meta-item { display: flex; justify-content: space-between; color: var(--ink-light); }
.meta-item span:last-child { color: var(--ink); font-variant-numeric: tabular-nums; }

.achievement-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(184,134,11,0.15); border: 1px solid var(--gold); border-radius: 12px; font-size: 11px; }
.achievement-badge.common { border-color: #8b8b8b; background: rgba(139,139,139,0.1); }
.achievement-badge.uncommon { border-color: #4a7c59; background: rgba(74,124,74,0.1); }
.achievement-badge.rare { border-color: #4a6fa5; background: rgba(74,111,165,0.1); }
.achievement-badge.legendary { border-color: #c9a961; background: rgba(201,169,97,0.15); }
.achievement-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); background: rgba(255,252,240,0.98); border: 2px solid var(--gold); border-radius: 8px; padding: 40px; z-index: 200; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.achievement-popup.show { transform: translate(-50%,-50%) scale(1); }
.achievement-popup-icon { font-size: 64px; margin-bottom: 16px; }
.achievement-popup-title { font-family: 'Ma Shan Zheng', serif; font-size: 32px; color: var(--seal); margin-bottom: 8px; }
.achievement-popup-desc { font-size: 14px; color: var(--ink-light); margin-bottom: 24px; }
.achievement-popup-close { padding: 10px 30px; background: var(--gold); color: var(--paper); border: none; border-radius: 4px; cursor: pointer; font-family: 'Noto Serif SC', serif; }

.narrative-area { display: flex; flex-direction: column; }
.timeline-bar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: rgba(255,252,240,0.55); border: 1px solid var(--gold); border-radius: 4px; margin-bottom: 16px; font-size: 13px; }
.timeline-age { font-family: 'Ma Shan Zheng', serif; font-size: 26px; color: var(--seal); }
.timeline-stage { color: var(--ink-light); }
.timeline-count { margin-left: auto; color: var(--ink-light); font-size: 12px; }
.timeline-seed { color: var(--gold); font-size: 11px; font-family: monospace; }
.event-card { background: rgba(255,252,240,0.88); border: 1px solid var(--gold); border-radius: 4px; padding: 44px 48px; box-shadow: 0 4px 16px var(--shadow); position: relative; min-height: 420px; display: flex; flex-direction: column; animation: cardIn 0.5s ease both; }
.event-card::before, .event-card::after { content: '❦'; position: absolute; color: var(--gold); font-size: 16px; opacity: 0.5; }
.event-card::before { top: 14px; left: 18px; }
.event-card::after { bottom: 14px; right: 18px; transform: rotate(180deg); }
.event-title { font-family: 'Ma Shan Zheng', serif; font-size: 34px; text-align: center; margin-bottom: 26px; letter-spacing: 0.05em; }
.event-narrative { font-size: 17px; line-height: 2; margin-bottom: 32px; }
.event-narrative p { margin-bottom: 12px; text-indent: 2em; animation: fadeInUp 0.5s ease both; }
.event-narrative p:nth-child(2) { animation-delay: 0.1s; }
.event-narrative p:nth-child(3) { animation-delay: 0.2s; }
.choices { display: flex; flex-direction: column; gap: 12px; margin-top: auto; }
.choice-btn { padding: 14px 24px; background: rgba(255,252,240,0.85); border: 1px solid var(--gold); border-radius: 4px; font-family: 'Noto Serif SC', serif; font-size: 16px; color: var(--ink); cursor: pointer; transition: all 0.25s ease; text-align: left; position: relative; overflow: hidden; }
.choice-btn::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(168,134,71,0.25), transparent 60%); opacity: 0; transition: opacity 0.3s; }
.choice-btn:hover { background: rgba(255,252,240,1); border-color: var(--seal); color: var(--seal); transform: translateX(4px); }
.choice-btn:hover::before { opacity: 1; }
.choice-req { display: block; font-size: 12px; color: var(--ink-light); font-weight: normal; margin-top: 4px; }
.relevant-attrs { margin-bottom: 16px; padding: 12px; background: rgba(168,134,71,0.08); border-radius: 4px; border-left: 2px solid var(--gold); }
.relevant-attrs .attrs-label { font-size: 12px; color: var(--ink-light); margin: 0 0 8px 0; }
.relevant-attr { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
.relevant-attr .attr-name { color: var(--ink); }
.relevant-attr .attr-val { color: var(--seal); font-weight: 600; }

.outcome-display { padding: 22px 24px; background: rgba(139,44,44,0.05); border-left: 3px solid var(--seal); margin-bottom: 22px; font-size: 16px; line-height: 1.95; animation: fadeInUp 0.4s ease both; border-radius: 0 4px 4px 0; }
.outcome-display.crit-success { border-left-color: #b8860b; background: rgba(201,169,97,0.12); }
.outcome-display.crit-failure { border-left-color: #5a2a2a; background: rgba(90,42,42,0.1); }
.outcome-tag { display: inline-block; padding: 3px 10px; font-size: 11px; font-weight: 700; border-radius: 2px; margin-bottom: 10px; letter-spacing: 0.15em; color: white; }
.outcome-tag.success { background: #b8860b; }
.outcome-tag.crit-success { background: #6b4f0e; }
.outcome-tag.failure { background: #8b6f47; }
.outcome-tag.crit-failure { background: #5a2a2a; }
.outcome-reason { margin-top: 10px; padding: 8px 12px; font-size: 13px; line-height: 1.7; border-radius: 3px; animation: fadeIn 0.5s ease 0.2s both; }
.failure-reason { background: rgba(90,42,42,0.1); color: #6b2a2a; border-left: 2px solid #5a2a2a; }
.success-reason { background: rgba(184,134,11,0.1); color: #6b4f0e; border-left: 2px solid #b8860b; }
.changes-list { margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(168,134,71,0.3); display: flex; flex-wrap: wrap; gap: 8px; animation: fadeIn 0.6s ease 0.3s both; }
.change-item { display: inline-block; padding: 4px 10px; font-size: 12px; border-radius: 3px; font-weight: 600; letter-spacing: 0.05em; }
.change-up { background: rgba(74,124,74,0.15); color: #3a6b3a; border: 1px solid rgba(74,124,74,0.3); animation: changePop 0.5s ease 0.4s both; }
.change-down { background: rgba(139,44,44,0.12); color: #6b2a2a; border: 1px solid rgba(139,44,44,0.25); animation: changePop 0.5s ease 0.4s both; }
.change-trait-add { background: rgba(184,134,11,0.15); color: #6b4f0e; border: 1px solid rgba(184,134,11,0.35); animation: changePop 0.5s ease 0.5s both; }
.change-trait-remove { background: rgba(100,100,100,0.1); color: #555; border: 1px solid rgba(100,100,100,0.2); animation: changePop 0.5s ease 0.5s both; }
@keyframes changePop { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.continue-btn { padding: 12px 36px; background: var(--seal); color: var(--paper); border: none; border-radius: 4px; font-family: 'Noto Serif SC', serif; font-size: 16px; cursor: pointer; align-self: center; transition: all 0.2s; }
.continue-btn:hover { background: #6b1f1f; transform: scale(1.04); }

.ending-page { max-width: 820px; margin: 0 auto; padding: 60px 40px; }
.ending-title { font-family: 'Ma Shan Zheng', serif; font-size: 52px; text-align: center; color: var(--seal); margin-bottom: 8px; animation: titleIn 0.8s ease both; }
.ending-subtitle { text-align: center; color: var(--ink-light); font-size: 16px; margin-bottom: 36px; animation: fadeIn 1s ease 0.3s both; }
.ending-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 32px; animation: fadeIn 1s ease 0.5s both; }
.ending-tag { padding: 6px 16px; background: var(--seal); color: var(--paper); font-family: 'Ma Shan Zheng', serif; font-size: 16px; border-radius: 2px; transform: rotate(-1deg); box-shadow: 1px 1px 0 rgba(0,0,0,0.12); }
.ending-tag:nth-child(even) { transform: rotate(1deg); }
.ending-tag:nth-child(3n) { transform: rotate(-2deg); }
.memoir-scroll { background: rgba(255,252,240,0.75); border: 1px solid var(--gold); border-radius: 4px; padding: 48px 56px; box-shadow: 0 4px 16px var(--shadow); margin-bottom: 32px; max-height: 70vh; overflow-y: auto; animation: fadeInUp 0.6s ease both; }
.memoir-scroll::-webkit-scrollbar { width: 6px; }
.memoir-scroll::-webkit-scrollbar-track { background: transparent; }
.memoir-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
.memoir-preface p, .memoir-epilogue p { font-size: 16px; line-height: 2.2; text-indent: 2em; margin-bottom: 16px; }
.memoir-preface p:first-child { font-size: 18px; font-weight: 500; color: var(--seal); }
.chapter-divider { text-align: center; font-size: 24px; color: var(--gold); margin: 36px 0; letter-spacing: 20px; padding-left: 20px; }
.memoir-chapter { margin-bottom: 8px; }
.chapter-title { font-family: 'Ma Shan Zheng', serif; font-size: 28px; color: var(--seal); text-align: center; margin: 20px 0 28px; font-weight: normal; letter-spacing: 4px; }
.memoir-para { font-size: 16px; line-height: 2.2; text-indent: 2em; margin-bottom: 12px; }
.memoir-thought { font-size: 15px; line-height: 2; color: var(--ink-light); font-style: italic; text-indent: 2em; margin: 8px 0 14px; padding-left: 16px; border-left: 2px solid var(--gold); }
.memoir-result { font-size: 15px; line-height: 2; color: #5a6b4a; text-indent: 2em; margin: 4px 0 10px; }
.memoir-reflection { font-size: 15px; line-height: 2; color: var(--seal); text-indent: 2em; margin: 8px 0 18px; opacity: 0.85; }
.memoir-epilogue { margin-top: 8px; }
.memoir-epilogue p:last-child { font-size: 17px; font-style: italic; color: var(--seal); }
.epitaph { text-align: center; font-style: italic; font-size: 19px; color: var(--ink-light); margin-top: 28px; margin-bottom: 0; padding: 20px; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); }
.ending-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.action-btn { padding: 12px 32px; border: 1px solid var(--gold); background: rgba(255,252,240,0.7); color: var(--ink); font-family: 'Noto Serif SC', serif; font-size: 15px; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
.action-btn:hover { background: var(--gold); color: var(--paper); }
.action-btn.primary { background: var(--seal); color: var(--paper); border-color: var(--seal); }
.action-btn.primary:hover { background: #6b1f1f; }

.codex-page { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
.codex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid var(--gold); }
.codex-title { font-family: 'Ma Shan Zheng', serif; font-size: 38px; }
.codex-section-title { font-family: 'Ma Shan Zheng', serif; font-size: 22px; color: var(--seal); margin-bottom: 16px; margin-top: 8px; }
.codex-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 16px; margin-bottom: 36px; }
.codex-card { background: rgba(255,252,240,0.65); border: 1px solid var(--gold); border-radius: 4px; padding: 20px; min-height: 120px; transition: all 0.2s; }
.codex-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.codex-card.clickable { cursor: pointer; }
.codex-card.clickable:hover { border-color: var(--seal); }
.codex-card h4 { font-family: 'Ma Shan Zheng', serif; font-size: 19px; color: var(--seal); margin-bottom: 8px; }
.codex-card p { font-size: 13px; color: var(--ink-light); line-height: 1.7; }
.codex-empty { text-align: center; padding: 50px 20px; color: var(--ink-light); font-style: italic; grid-column: 1 / -1; }

.seed-modal { position: fixed; inset: 0; background: rgba(43,27,12,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease both; }
.seed-modal-content { background: var(--paper); border: 2px solid var(--gold); border-radius: 4px; padding: 40px; max-width: 400px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.seed-modal h3 { font-family: 'Ma Shan Zheng', serif; font-size: 26px; color: var(--seal); margin-bottom: 12px; text-align: center; }
.seed-modal p { font-size: 13px; color: var(--ink-light); margin-bottom: 16px; text-align: center; }
.seed-input { width: 100%; padding: 12px; border: 1px solid var(--gold); border-radius: 4px; font-family: 'Noto Serif SC', serif; font-size: 18px; text-align: center; letter-spacing: 0.2em; background: rgba(255,252,240,0.9); margin-bottom: 20px; text-transform: uppercase; }
.seed-input:focus { outline: none; border-color: var(--seal); }
.seed-actions { display: flex; gap: 12px; justify-content: center; }

.dying-overlay { position: fixed; inset: 0; background: rgba(20,10,0,0); pointer-events: none; z-index: 50; transition: background 1.5s ease; }
.dying-overlay.active { background: rgba(20,10,0,0.88); }
.death-seal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0) rotate(-45deg); width: 140px; height: 140px; background: var(--seal); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--paper); font-family: 'Ma Shan Zheng', serif; font-size: 40px; opacity: 0; z-index: 60; transition: all 0.9s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; box-shadow: 0 0 40px rgba(139,44,44,0.6); }
.dying-overlay.active .death-seal { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(-12deg); }

@media (max-width: 768px) {
  .game-page { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
  .status-panel { position: relative; top: 0; max-height: none; }
  .event-card { padding: 28px 22px; min-height: 320px; }
  .event-title { font-size: 26px; }
  .event-narrative { font-size: 15px; line-height: 1.85; }
  .memoir { padding: 28px 22px; }
  .ending-page { padding: 40px 20px; }
  .ending-title { font-size: 38px; }
  .codex-page { padding: 24px 16px; }
}
</style>
</head>
<body>
<div id="app"></div>
<div class="dying-overlay" id="dyingOverlay"><div class="death-seal">终</div></div>
<script>
// ==================== 数据配置区 ====================
const FATE_TIERS = [
  { tier:'destitute', name:'苦命', pointRange:[200,250], weight:20, desc:'命途多舛，生来便要负重前行。' },

];

// ==================== 时代背景 ====================
const ERAS = {

  '10s': {
    id:'10s', name:'10后', birthYearRange:[2010,2019],

function getFamilyDesc(family) {
  const job = FAMILY_DIMS.parentJob.options.find(o => o.id === family.parentJob);
  const wealth = FAMILY_DIMS.wealth.options.find(o => o.id === family.wealth);
  const struct = FAMILY_DIMS.structure.options.find(o => o.id === family.structure);
  const region = FAMILY_DIMS.region.options.find(o => o.id === family.region);
  const sib = FAMILY_DIMS.sibling.options.find(o => o.id === family.sibling);
  const parts = [];
  parts.push(region.name + (family.parentJob === 'farmer' ? '的'+job.name+'家庭' : '的'+job.name+'之家'));
  if (family.structure === 'harmonious') parts.push('父母恩爱');
  else if (family.structure === 'divorced') parts.push('父母离异');
  else if (family.structure === 'single') parts.push('单亲抚养');
  else if (family.structure === 'leftbehind') parts.push('父母外出打工');
  else if (family.structure === 'strict') parts.push('家教森严');
  let sibDesc = sib.name === '独生' ? '独生子女' : '家中' + sib.name.replace('长子/长女','老大').replace('幼子/幼女','老幺').replace('中间子女','夹在中间');
  parts.push(sibDesc);
  return { short: parts.join('·'), full: parts.join('，'), wealth:wealth.name, region:region.name, job:job.name, structure:family.structure, sibling:family.sibling };
}

function checkAchievements(character) {
  const newAchievements = [];
  const existing = new Set(character.achievements || []);
  
  if (character.age >= 18 && !existing.has('survive_18')) newAchievements.push('survive_18');
  if (character.age >= 60 && !existing.has('survive_60')) newAchievements.push('survive_60');
  if (character.age >= 80 && !existing.has('survive_80')) newAchievements.push('survive_80');
  if (character.age >= 100 && !existing.has('survive_100')) newAchievements.push('survive_100');
  
  if (character.flags.gaokao_pass && !existing.has('gaokao_pass')) newAchievements.push('gaokao_pass');
  if (character.flags.college_graduated && !existing.has('graduate_college')) newAchievements.push('graduate_college');
  if (character.flags.married && !existing.has('marry')) newAchievements.push('marry');
  if (character.flags.has_child && !existing.has('have_child')) newAchievements.push('have_child');
  if (character.flags.retired && !existing.has('retire')) newAchievements.push('retire');
  
  if (character.money >= 1000 && !existing.has('money_1000')) newAchievements.push('money_1000');
  if (character.money >= 10000 && !existing.has('money_10000')) newAchievements.push('money_10000');
  if (character.money >= 100000 && !existing.has('money_100000')) newAchievements.push('money_100000');
  
  if (character.health >= 100 && !existing.has('health_max')) newAchievements.push('health_max');
  if (character.mood >= 100 && !existing.has('mood_max')) newAchievements.push('mood_max');
  
  if (character.attrs.intelligence >= 90 && !existing.has('scholar')) newAchievements.push('scholar');
  if (character.attrs.constitution >= 90 && !existing.has('athlete')) newAchievements.push('athlete');
  if (character.attrs.charm >= 90 && !existing.has('charmer')) newAchievements.push('charmer');
  if (character.attrs.luck >= 90 && !existing.has('lucky')) newAchievements.push('lucky');
  if (character.attrs.willpower >= 90 && !existing.has('iron_will')) newAchievements.push('iron_will');
  if (character.attrs.comprehension >= 90 && !existing.has('enlightened')) newAchievements.push('enlightened');
  
  const allHigh = Object.values(character.attrs).every(v => v >= 80);
  if (allHigh && !existing.has('all_attrs_high')) newAchievements.push('all_attrs_high');
  
  if ((character.traits || []).length >= 10 && !existing.has('trait_collection')) newAchievements.push('trait_collection');
  if ((character.timeline || []).length >= 50 && !existing.has('event_collection')) newAchievements.push('event_collection');
  
  if (newAchievements.length > 0) {
    character.achievements = [...existing, ...newAchievements];
  }
  
  return newAchievements;
}

function showAchievementPopup(achievementIds) {
  if (!achievementIds || achievementIds.length === 0) return;
  let index = 0;
  const showNext = () => {
    if (index >= achievementIds.length) return;
    const aid = achievementIds[index];
    const a = ACHIEVEMENTS[aid];
    if (!a) { index++; showNext(); return; }
    
    const popup = document.createElement('div');
    popup.className = 'achievement-popup';
    popup.innerHTML = `
      <div class="achievement-popup-icon">${a.icon}</div>
      <h3 class="achievement-popup-title">解锁成就</h3>
      <p style="font-size:24px;color:var(--seal);margin-bottom:8px;">${a.name}</p>
      <p class="achievement-popup-desc">${a.desc}</p>
      <button class="achievement-popup-close">收下</button>
    `;
    document.body.appendChild(popup);
    setTimeout(() => popup.classList.add('show'), 50);
    
    popup.querySelector('button').onclick = () => {
      popup.classList.remove('show');
      setTimeout(() => { popup.remove(); index++; showNext(); }, 400);
    };
  };
  showNext();
}

// ==================== 核心模块 ====================
// 种子随机数（mulberry32）
function createRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function randomSeed() { return Math.floor(Math.random() * 4294967296); }
function encodeSeed(seed) { return seed.toString(36).toUpperCase().padStart(7, '0'); }
function decodeSeed(code) { const n = parseInt(code, 36); return isNaN(n) ? -1 : n; }
function weightedPick(rng, items, weightKey) {
  weightKey = weightKey || 'weight';
  const total = items.reduce((s, it) => s + (it[weightKey] || 0), 0);
  let r = rng() * total;
  for (const it of items) {
    r -= (it[weightKey] || 0);
    if (r <= 0) return it;
  }
  return items[items.length - 1];
}
function rollD20(rng) { return Math.floor(rng() * 20) + 1; }

// 全局状态
const state = { page:'start', character:null, currentEvent:null, currentOutcome:null, rng:null, seed:null, pendingEvents:[], ending:null };

// 角色生成
function generateCharacter(seed) {
  const rng = createRng(seed);
  // 1. 时代
  const eraKeys = Object.keys(ERAS);
  const era = eraKeys[Math.floor(rng() * eraKeys.length)];
  const eraCfg = ERAS[era];
  const birthYear = eraCfg.birthYearRange[0] + Math.floor(rng() * (eraCfg.birthYearRange[1] - eraCfg.birthYearRange[0] + 1));
  // 2. 多维家庭
  const family = {};
  let moneyMod = 0, moodMod = 0;
  const attrMods = {};
  for (const [dim, config] of Object.entries(FAMILY_DIMS)) {
    const options = config.options.map(o => {
      let w = o.weight;
      if (o.eraMod && o.eraMod[era]) w = Math.max(1, w + o.eraMod[era]);
      return { ...o, weight:w };
    });
    const picked = weightedPick(rng, options);
    family[dim] = picked.id;
    if (picked.moneyMod) moneyMod += picked.moneyMod;
    if (picked.moodMod) moodMod += picked.moodMod;
    if (picked.attrMod) for (const [k,v] of Object.entries(picked.attrMod)) attrMods[k] = (attrMods[k]||0) + v;
  }
  const familyDesc = getFamilyDesc(family);
  // 3. 命格与属性
  const fate = weightedPick(rng, FATE_TIERS);
  const [min, max] = fate.pointRange;
  const totalPoints = Math.floor(min + rng() * (max - min + 1));
  const attrKeys = ['constitution','intelligence','charm','luck','willpower','comprehension'];
  const attrs = {};
  let remaining = totalPoints;
  const weights = attrKeys.map(() => 0.5 + rng());
  const weightsSum = weights.reduce((a,b) => a+b, 0);
  for (let i = 0; i < attrKeys.length; i++) {
    if (i === attrKeys.length - 1) {
      attrs[attrKeys[i]] = Math.max(10, Math.min(100, remaining));
    } else {
      const portion = totalPoints * (weights[i] / weightsSum);
      const val = Math.max(10, Math.min(100, Math.floor(portion)));
      attrs[attrKeys[i]] = val;
      remaining -= val;
    }
  }
  // 应用家庭属性加成
  for (const [k,v] of Object.entries(attrMods)) attrs[k] = Math.max(10, Math.min(100, attrs[k] + v));
  // 4. 性别
  const gender = rng() < 0.5 ? 'male' : 'female';
  // 5. 特质
  const innatePool = Object.values(TRAITS).filter(t => t.type === 'innate');
  const traitCount = Math.floor(rng() * 4);
  const traits = [];
  const usedTraitIds = new Set();
  for (let i = 0; i < traitCount; i++) {
    const pool = innatePool.filter(t => !usedTraitIds.has(t.id));
    if (pool.length === 0) break;
    const rarityWeight = { common:10, rare:3, legendary:1 };
    const weighted = pool.map(t => ({ ...t, weight: rarityWeight[t.rarity] || 5 }));
    const picked = weightedPick(rng, weighted);
    traits.push(picked);
    usedTraitIds.add(picked.id);
  }
  // 6. 姓名（性别相关）
  const surnames = ['林','陈','王','李','张','赵','周','吴','沈','韩','苏','萧','楚','叶','夏','顾','宋','徐','许','何'];
  const maleGiven = ['安','远','舟','言','之','川','岳','迟','遇','南','北','拾','玖','青','禾','初','然','渡'];
  const femaleGiven = ['宁','微','澜','笙','忆','归','晓','溪','芷','若','晴','柔','婉','清','念','栀','棠','薇'];
  const givenPool = gender === 'male' ? maleGiven : femaleGiven;
  const name = surnames[Math.floor(rng() * surnames.length)] + givenPool[Math.floor(rng() * givenPool.length)] + givenPool[Math.floor(rng() * givenPool.length)];
  // 7. 起始资金
  const baseMoney = { poor:0, modest:20, comfortable:60, rich:200 }[family.wealth] || 20;
  const startMoney = Math.max(0, baseMoney + moneyMod);
  return {
    name, age:0, gender, alive:true,
    era, birthYear, eraName:eraCfg.name, eraDesc:eraCfg.desc, eraFeatures:eraCfg.features,
    family, familyDesc,
    fateTier:fate.tier, fateName:fate.name, fateDesc:fate.desc,
    attrs, mood:moodMod, money:startMoney, health:100, energy:100, maxEnergy:100,
    traits, flags:{}, timeline:[], stats:{ eventCount:0, ageReached:0 },
    achievements:[],
  };
}

// 条件检查
function checkCondition(character, cond) {
  const { type, op, key, value } = cond;
  let actual;
  if (type === 'flag') {
    actual = character.flags[key];
    if (op === 'has') return actual !== undefined && actual !== false;
    if (op === 'not_has') return actual === undefined || actual === false;
    if (op === 'eq') return actual === value;
  } else if (type === 'attr') { actual = character.attrs[key]; }
  else if (type === 'trait') {
    actual = character.traits.some(t => t.id === key);
    if (op === 'has') return actual;
    if (op === 'not_has') return !actual;
  } else if (type === 'family') {
    // 新版：家庭维度判断，cond.dim 指定维度
    const dim = cond.dim || 'wealth';
    actual = character.family[dim];
    if (op === 'eq') return actual === value;
    if (op === 'in') return Array.isArray(value) && value.includes(actual);
    if (op === 'not_in') return Array.isArray(value) && !value.includes(actual);
    if (op === 'neq') return actual !== value;
  } else if (type === 'era') {
    actual = character.era;
    if (op === 'eq') return actual === value;
    if (op === 'in') return Array.isArray(value) && value.includes(actual);
    if (op === 'not_in') return Array.isArray(value) && !value.includes(actual);
  } else if (type === 'gender') {
    actual = character.gender;
    if (op === 'eq') return actual === value;
  } else if (type === 'age') { actual = character.age; }
  else if (type === 'mood') { actual = character.mood; }
  else if (type === 'money') { actual = character.money; }
  else if (type === 'health') { actual = character.health; }
  if (op === 'eq') return actual === value;
  if (op === 'gt') return actual > value;
  if (op === 'lt') return actual < value;
  if (op === 'gte') return actual >= value;
  if (op === 'lte') return actual <= value;
  if (op === 'in_range') return actual >= value[0] && actual <= value[1];
  return true;
}
function checkAllConditions(character, conditions) {
  if (!conditions || conditions.length === 0) return true;
  return conditions.every(c => checkCondition(character, c));
}

// 选项可用性检查（支持 available 函数或 conditions 数组）
function isChoiceAvailable(character, choice) {
  if (typeof choice.available === 'function') return choice.available(character);
  if (choice.conditions) return checkAllConditions(character, choice.conditions);
  return true;
}

// 事件生成器
// 获取事件的有效选项列表（支持 choices 为函数动态生成）
function getEventChoices(ev, character) {
  if (!ev.choices) return [];
  const raw = typeof ev.choices === 'function' ? ev.choices(character) : ev.choices;
  return raw.filter(c => isChoiceAvailable(character, c));
}

function pickEvent(character, rng) {
  if (state.pendingEvents.length > 0) {
    const evId = state.pendingEvents.shift();
    const ev = EVENTS.find(e => e.id === evId);
    if (ev) return ev;
  }
  let attempts = 0;
  while (attempts < 10) {
    const candidates = EVENTS.filter(ev => {
      if (character.age < ev.ageRange[0] || character.age > ev.ageRange[1]) return false;
      if (ev.once && character.flags[ev.id + '_done']) return false;
      if (!checkAllConditions(character, ev.conditions)) return false;
      // passive 事件无需选项；其他事件需要至少一个可用选项
      if (ev.passive) return true;
      const availableChoices = getEventChoices(ev, character);
      if (availableChoices.length === 0) return false;
      return true;
    });
    if (candidates.length > 0) {
      const weighted = candidates.map(ev => {
        let w = ev.weight;
        if (ev.priority) w += ev.priority;
        return { ...ev, finalWeight: w };
      });
      return weightedPick(rng, weighted, 'finalWeight');
    }
    character.age += 1;
    attempts++;
    if (character.age > 85) return null;
  }
  // 兜底：返回对应年龄段的"寻常一天"事件
  if (character.age >= 56) return EVENTS.find(e => e.id === 'ordinary_day_old');
  if (character.age >= 30) return EVENTS.find(e => e.id === 'ordinary_day_middle');
  if (character.age >= 18) return EVENTS.find(e => e.id === 'ordinary_day_youth');
  return EVENTS.find(e => e.id === 'ordinary_day');
}

// 特质修正
function getTraitModifier(character, attr, category) {
  let mod = 0;
  for (const trait of character.traits) {
    for (const effect of trait.effects) {
      if (effect.trigger === 'check_modifier' && effect.target === attr) {
        if (effect.condition && category) {
          if (effect.condition === 'campus' && category !== 'campus') continue;
        }
        mod += effect.value;
      }
    }
  }
  return mod;
}

function getTraitEffectDesc(trait) {
  const effects = trait.effects || [];
  if (effects.length === 0) return '';
  const descs = [];
  for (const eff of effects) {
    if (eff.trigger === 'check_modifier') {
      const attrName = ATTR_NAMES[eff.target] || eff.target;
      const sign = eff.value > 0 ? '+' : '';
      const condText = eff.condition === 'campus' ? '（校园场景）' : '';
      descs.push(`${attrName}判定${sign}${eff.value}${condText}`);
    } else if (eff.trigger === 'attr_regen') {
      const attrName = ATTR_NAMES[eff.target] || eff.target;
      const sign = eff.value > 0 ? '+' : '';
      descs.push(`每年恢复${sign}${eff.value} ${attrName}`);
    }
  }
  return descs.join('；');
}

// 结算
function resolveChoice(character, event, choice, rng) {
  const resolve = choice.resolve;
  let outcome, resultTag;
  if (resolve.check) {
    const { attr, difficulty } = resolve.check;
    const attrVal = character.attrs[attr];
    const traitMod = getTraitModifier(character, attr, event.category);
    const moodMod = character.mood < -20 ? -8 : (character.mood > 20 ? 5 : 0);
    const healthMod = character.health < 30 ? -10 : 0;
    let successRate = 50 + (attrVal - difficulty) * 1.2 + traitMod * 2 + moodMod + healthMod;
    successRate = Math.max(5, Math.min(95, successRate));
    const roll = Math.floor(rng() * 100);
    const critSuccessRate = Math.max(2, successRate - 30);
    const critFailRate = Math.max(2, 15 - (successRate - 50) * 0.5);
    if (roll < critSuccessRate) { outcome = resolve.outcomes.on_crit_success || resolve.outcomes.on_success; resultTag = 'crit-success'; }
    else if (roll < successRate) { outcome = resolve.outcomes.on_success; resultTag = 'success'; }
    else if (roll > 100 - critFailRate) { outcome = resolve.outcomes.on_crit_failure || resolve.outcomes.on_failure; resultTag = 'crit-failure'; }
    else { outcome = resolve.outcomes.on_failure; resultTag = 'failure'; }
  } else {
    outcome = resolve.default; resultTag = 'default';
  }
  if (!outcome) {
    outcome = { narrative: generateDefaultNarrative(event.title, character) };
  }
  // 附加内心独白（优先用 outcome 自己的，否则用 choice 的）
  if (outcome.innerThought) outcome._innerThought = outcome.innerThought;
  else if (choice.innerThought) outcome._innerThought = typeof choice.innerThought === 'function' ? choice.innerThought(character) : choice.innerThought;
  outcome._resultTag = resultTag;
  return { outcome, resultTag };
}

// 生成失败原因说明
function generateFailureReason(character, event, choice, result) {
  const reasons = [];
  // 属性不足
  if (choice.resolve && choice.resolve.check) {
    const attr = choice.resolve.check.attr;
    const attrName = ATTR_NAMES[attr] || attr;
    const attrVal = character.attrs[attr];
    const diff = choice.resolve.check.difficulty - attrVal;
    if (diff > 0) {
      reasons.push(`${attrName}不足（${attrVal}，需要${choice.resolve.check.difficulty}）`);
    }
  }
  // 心情低落
  if (character.mood < -20) reasons.push('心情低落影响了发挥');
  // 健康不佳
  if (character.health < 30) reasons.push('身体状态不佳');
  // 运气差
  if (character.attrs.luck < 30) reasons.push('时运不济');

  if (reasons.length === 0) return '';
  return '未能如愿——' + reasons.join('，') + '。';
}

// 生成成功原因说明
function generateSuccessReason(character, event, choice, result) {
  const reasons = [];
  if (choice.resolve && choice.resolve.check) {
    const attr = choice.resolve.check.attr;
    const attrName = ATTR_NAMES[attr] || attr;
    const attrVal = character.attrs[attr];
    if (attrVal >= 70) reasons.push(`${attrName}出众`);
    else if (attrVal >= 60) reasons.push(`${attrName}过硬`);
  }
  if (character.mood > 20) reasons.push('心情正佳');
  if (character.health > 70) reasons.push('精力充沛');
  if (character.attrs.luck > 70) reasons.push('好运加持');
  // 特质加持
  for (const t of character.traits) {
    if (t.effects) {
      for (const e of t.effects) {
        if (e.trigger === 'check_modifier') reasons.push(`「${t.name}」特质加持`);
      }
    }
  }
  if (reasons.length === 0) return '';
  return '成功——' + reasons.join('，') + '。';
}

// 默认年龄推进
function defaultAgeAdvance(age) {
  if (age < 3) return 1;
  if (age < 12) return 1;
  if (age < 18) return 1;
  return 2;
}

// 应用 outcome
function applyOutcome(character, outcome, event, choice, rng) {
  if (outcome.attrChanges) {
    for (const [k, v] of Object.entries(outcome.attrChanges)) {
      if (k === 'health') {
        character.health = Math.max(0, Math.min(100, character.health + v));
      } else if (character.attrs[k] !== undefined) {
        character.attrs[k] = Math.max(0, Math.min(100, character.attrs[k] + v));
      }
    }
  }
  if (outcome.moodChange) character.mood = Math.max(-100, Math.min(100, character.mood + outcome.moodChange));
  if (outcome.moneyChange) character.money += outcome.moneyChange;
  if (outcome.healthChange) character.health = Math.max(0, Math.min(100, character.health + outcome.healthChange));
  if (outcome.addTraits) {
    for (const grant of outcome.addTraits) {
      if (rng() < grant.chance) {
        const trait = TRAITS[grant.traitId];
        if (trait && !character.traits.some(t => t.id === trait.id)) {
          character.traits.push(trait);
        }
      }
    }
  }
  if (outcome.removeTraits) character.traits = character.traits.filter(t => !outcome.removeTraits.includes(t.id));
  if (outcome.setFlags) for (const [k,v] of Object.entries(outcome.setFlags)) character.flags[k] = v;
  if (event.once) character.flags[event.id + '_done'] = true;
  // nextEvent: 直接指定下一事件（强插队首），triggerEvents: 延迟触发的后续事件（入队尾）
  if (outcome.triggerEvents) state.pendingEvents.push(...outcome.triggerEvents);
  if (outcome.nextEvent) state.pendingEvents.unshift(outcome.nextEvent);
  const ageAdvance = outcome.ageAdvance || defaultAgeAdvance(character.age);
  character.age += ageAdvance;
  // 年龄衰减：每年衰减一次，而不是每次事件都衰减
  if (ageAdvance > 0 && character.age >= 30) {
    const decayRate = Math.min(3, Math.floor((character.age - 30) / 10));
    character.health = Math.max(0, character.health - decayRate);
    character.attrs.constitution = Math.max(0, character.attrs.constitution - decayRate);
    if (character.age >= 50) {
      character.mood = Math.max(-100, character.mood - Math.floor(decayRate / 2));
    }
  }
  character.stats.eventCount += 1;
  character.stats.ageReached = character.age;
  // 特质 regen
  for (const trait of character.traits) {
    for (const effect of trait.effects) {
      if (effect.trigger === 'attr_regen') {
        if (effect.target === 'health') character.health = Math.max(0, Math.min(100, character.health + effect.value));
        if (effect.target === 'mood') character.mood = Math.max(-100, Math.min(100, character.mood + effect.value));
        if (effect.target === 'money') character.money += effect.value;
      }
    }
  }
  character.timeline.push({
    age:character.age, eventId:event.id, eventTitle:event.title, category:event.category || 'daily',
    choiceId:choice.id, choiceText:choice.text,
    outcomeNarrative:outcome.narrative || '', flagsSet:outcome.setFlags || {},
    resultTag: outcome._resultTag || 'default',
    isPassive: event.passive ? true : false,
    isMilestone: (event.priority && event.priority >= 80) ? true : false,
  });
  // 检查成就并显示弹窗
  const newAchievements = checkAchievements(character);
  if (newAchievements.length > 0) {
    setTimeout(() => showAchievementPopup(newAchievements), 600);
  }
}

// 死亡检查
function checkDeath(character) {
  if (character.health <= 0) return { dead:true, reason:'健康崩溃' };
  let lifespan = 70 + Math.floor(character.attrs.luck / 5);
  if (character.traits.some(t => t.id === 'longlife')) lifespan += 15;
  if (character.traits.some(t => t.id === 'short_life')) lifespan -= 15;
  if (character.age >= lifespan) return { dead:true, reason:'寿终正寝' };
  if (character.age >= 85) return { dead:true, reason:'寿终正寝' };
  return { dead:false };
}

        stageEntries[stage.name].push(entry);

  // ============ 内心独白生成器 ============

      else if (chId === 'open_marriage') s += `我和伴侣坦白了一切，重新审视我们的婚姻。`;
      s += `\n\n有些事，一旦做了，就再也回不去了。`;
      return s;
    }

    // === 离婚 ===
    if (evId === 'divorce_decision') {
      let s = `事情败露后，`;
      if (chId === 'divorce') s += `我们离了婚。错了就是错了，我承担后果。放过Ta，也放过我自己。`;
      else if (chId === 'reconcile') s += `我下跪求原谅。我知道错了，只要Ta肯原谅我，我以后再也不会了。`;
      s += `\n\n有些错，一旦犯了，就再也回不去了。`;
      return s;
    }

    // === 父母病重 ===
    if (evId === 'parents_serious_ill') {
      let s = `父母病重住院了。`;
      if (chId === 'best_care') s += `我不惜代价治疗。砸锅卖铁也要治，钱没了可以再赚，父母只有一个。`;
      else if (chId === 'basic_care') s += `我尽力而为，量力而行。他们要是知道，也不会想我把家拖垮。`;
      else if (chId === 'hospice') s += `我选择了保守治疗。与其插满管子痛苦地活着，不如少受点罪，走得体面些。`;
      else if (chId === 'cant_afford') s += `我实在拿不出钱，只能接父母回家。我真没用。`;
      s += `\n\n父母在，人生尚有来处；父母去，人生只剩归途。`;
      return s;
    }

    // === 子女教育 ===
    if (evId === 'child_education') {
      let s = `关于孩子的教育，`;
      if (chId === 'tiger_parent') s += `我成了虎妈狼爸。我这辈子就这样了，不能让孩子重走我的老路。`;
      else if (chId === 'happy_education') s += `我选择了放养。孩子的快乐比什么都重要。`;
      else if (chId === 'send_abroad') s += `我送孩子出国读书。能送就送出去看看，外面的世界比我能给的大。`;
      else if (chId === 'follow_heart') s += `我尊重孩子的意愿。路是他/她自己的，我替他/她选了，他/她也不会听。`;
      return s;
    }

    // === 退休前夕 ===
    if (evId === 'pre_retirement') {
      let s = `退休前夕，`;
      if (chId === 'mentor') s += `我把经验传给年轻人，体面退场。一辈子快到头了，留点好名声。`;
      else if (chId === 'cling') s += `我舍不得位置，处处掣肘年轻人。我还没老，凭什么让我让位？`;
      else if (chId === 'early_retire') s += `我提前退休了。辛苦了一辈子，该歇歇了。`;
      else if (chId === 'second_career') s += `我开始规划退休后的"第二职业"。退休不是终点。`;
      s += `\n\n退休那天，我以为我会很难过。结果反而觉得，终于轻松了。`;
      return s;
    }

    // === 养老院 ===
    if (evId === 'nursing_home') {
      let s = `年纪大了，独居越来越吃力。`;
      if (chId === 'good_home') s += `我去了个好点的养老院。辛苦了一辈子，老了该享点福。`;
      else if (chId === 'cheap_home') s += `我去了普通的养老院，省点钱给孩子。`;
      else if (chId === 'refuse') s += `我哪儿也不去。死也要死在自己家里。`;
      else if (chId === 'hire_aid') s += `我请了个住家保姆。自己家自在。`;
      return s;
    }

    // === 赌博诱惑 ===
    if (evId === 'gambling_trap') {
      let s = `面对一夜暴富的诱惑，`;
      if (chId === 'all_in') s += `我梭哈了。反正也这样了，搏一把万一成了呢？`;
      else if (chId === 'small_bet') s += `我投了点小钱玩一玩，当消遣。`;
      else if (chId === 'refuse') s += `我没碰。天上不会掉馅饼，老老实实过日子比什么都强。`;
      if (tag === 'crit-success' || tag === 'success') s += `\n\n那一次，我赌对了。`;
      else if (tag === 'crit-failure' || tag === 'failure') s += `\n\n结果可想而知。那次跌倒，我花了很久才爬起来。`;
      return s;
    }

    // === 被动事件（里程碑） ===
    if (entry.isPassive) {
      if (evId === 'turn_thirty') return `三十岁生日那天，我独自坐在窗前。工作稳定，但似乎看到了自己未来三十年的样子。所谓"立"，不是稳定，是接受。`;
      if (evId === 'turn_fifty') return `五十岁了。孔子说"五十而知天命"，我以前不懂，现在懂了。不再执着于"应该"，开始接受"就是这样"。`;
      if (evId === 'retirement_day') return `终于退休了。时间一下子多了起来，多到让我不知所措。`;
      if (evId === 'turn_seventy') return `七十岁了。古人说"人生七十古来稀"，活到这个岁数，总有些话想说。回首这一生，忽然想起很多被遗忘的瞬间。`;
      if (evId === 'final_days') return `最后的日子里，我躺在床上，意识开始模糊。想起小时候母亲抱我的样子，想起第一次上学，想起那个没说出口的"喜欢"，想起孩子出生时的啼哭。原来人生是一条河，我已走到入海口。`;
      if (evId === 'parents_aging') return `回家过年，忽然发现父亲的背有点驼了，母亲的白发多了。我忽然意识到，我和父母相处的时间，其实不多了。`;
      if (evId === 'parents_pass') return `父母走了。从此，我在这个世上再也没有"老家"可回了。整理遗物时，发现母亲偷偷藏着我小时候的照片。父亲记账本最后一页写着："给孩子留点钱，别让他/她太辛苦。"我哭得像个孩子。`;
      if (evId === 'midlife_crisis') return `深夜，我躺在床上睡不着。开始回想：当初那个选择，是不是错了？"我这辈子，就这样了吗？"`;
      if (evId === 'values_form') return `某个深夜，我忽然想明白了一些事。关于人生，关于自己。说不清是什么，但心境不一样了。`;
      if (evId === 'spouse_pass') return `老伴走了。从青春到白头，这一程走完了。我握着Ta渐渐冰冷的手，没有哭，只是觉得心里空了一块。`;
      if (evId === 'friends_passing') return `又一个老朋友走了。活着的人越来越少，能说话的人也越来越少。`;
      if (evId === 'era_reflection') return `我活了这么久，世界变得不认识了。我不懂，但也不再想去懂了。世界是年轻人的。`;
      // 其他被动事件：用 outcome 叙事
      if (outcome) return outcome.replace(/你/g, '我');
      return '';
    }

    // === 默认叙事：把选择融入故事 ===
    let s = '';
    if (entry.age < 6) {
      s = `${entry.age}岁那年，`;
    } else {
      s = `${entry.age}岁，`;
    }
    // 用 outcome 作为主体叙事，把"你"替换为"我"
    if (outcome && outcome.length > 5) {
      s += outcome.replace(/你/g, '我');
    } else {
      // 没有 outcome 时，用 choiceText 构造
      s += `那一年发生了「${entry.eventTitle}」的事。`;
    }
    // 结果回望
    if (tag === 'crit-success') s += `\n\n那一次，我超常发挥了。连我自己都不敢相信。那一次的成功，给了我好多年的底气。`;
    else if (tag === 'success') s += `\n\n我做到了。那一次的成功，给了我好多年的底气。`;
    else if (tag === 'crit-failure') s += `\n\n那真是最糟糕的一次。那次跌倒，我花了很久才爬起来。但爬起来之后，就什么都不怕了。`;
    else if (tag === 'failure') s += `\n\n失败了。遗憾吗？有一点。但人生哪能没有遗憾。`;
    return s;
  }

  // ============ 章节生成器 ============
  function buildChapter(stageName, entries, c) {
    if (!entries || entries.length === 0) return null;
    const paras = [];

    // 筛选事件：里程碑事件优先，然后是有结果的事件，最后是普通事件
    const important = entries.filter(e => e.isMilestone);
    const withResult = entries.filter(e => !e.isMilestone && e.resultTag !== 'default');
    const ordinary = entries.filter(e => !e.isMilestone && e.resultTag === 'default');

    // 选出更多代表性事件
    const selected = [];
    selected.push(...important.slice(0, 4));
    // 填充一些有结果的事件
    const rest1 = withResult.filter(e => !selected.some(s => s.eventId === e.eventId));
    const pickCount1 = Math.min(3, Math.floor(rest1.length / 2));
    for (let i = 0; i < pickCount1; i++) {
      const idx = Math.floor((i + 1) * rest1.length / (pickCount1 + 1));
      if (rest1[idx]) selected.push(rest1[idx]);
    }
    // 再填充一些普通事件
    const rest2 = ordinary.filter(e => !selected.some(s => s.eventId === e.eventId));
    const pickCount2 = Math.min(2, rest2.length);
    for (let i = 0; i < pickCount2; i++) {
      const idx = Math.floor((i + 1) * rest2.length / (pickCount2 + 1));
      if (rest2[idx]) selected.push(rest2[idx]);
    }

    // 按年龄排序
    selected.sort((a, b) => a.age - b.age);

    if (selected.length === 0) return null;

    // 将每个事件叙事化，合并成连贯段落
    for (const entry of selected) {
      const text = narrateEvent(entry, c);
      if (text && text.trim()) paras.push(text);
    }

    return { stage: stageName, paragraphs: paras };
  }

  // ============ 构建章节 ============
  const chapters = [];
  for (const stage of LIFE_STAGES) {
    const entries = stageEntries[stage.name];
    const ch = buildChapter(stage.name, entries, character);
    if (ch) chapters.push(ch);
  }

  // ============ 序言 ============
  let preface = '';
  const c = character;
  const totalEvents = c.timeline.length;
  preface = `我叫${c.name}，今年${c.age}岁。\n\n`;
  preface += `出生在${c.birthYear}年，${c.eraName}生人。${c.familyDesc.full}\n\n`;
  preface += `一路走来，经历了大大小小${totalEvents}件事。有些记忆犹新，有些早已模糊。\n\n`;
  preface += `现在坐在窗前，阳光落在手上，我忽然想把这一生写下来。不为给谁看，只是想知道——`;
  if (c.mood > 20) preface += `我这一辈子，到底值不值得。`;
  else if (c.mood < -20) preface += `如果能重来一次，我会不会选不一样的路。`;
  else preface += `我这一生，到底是怎么走到今天的。`;

  // ============ 尾声分层：按职业/家庭/财富生成不同独白 ============
  let epilogue = '';
  if (c.age >= 70) {
    epilogue = `人生七十古来稀。我活到了这个岁数，已经很满足了。\n\n`;
  } else if (c.age >= 50) {
    epilogue = `五十岁以后，日子像开了加速键。一眨眼，就老了。\n\n`;
  } else if (c.age >= 30) {
    epilogue = `人生才走了一半，路还长。但有些事，已经能看到结局了。\n\n`;
  } else {
    epilogue = `生命戛然而止。我还没来得及长大，就已经结束了。\n\n`;
  }

  // 职业独白
  if (c.flags.civil_servant) {
    epilogue += `这辈子在体制里待了几十年，起起落落，也算安稳。官场里的弯弯绕绕，我看了一辈子，到最后也懒得去想了。`;
  } else if (c.flags.senior_position) {
    epilogue += `从基层做到高管，我见过太多人来人往。权力、地位、金钱，这些东西生不带来死不带去。倒是夜深人静的时候，会想起刚入职那年，那个充满干劲的自己。`;
  } else if (c.flags.entrepreneur) {
    if (c.flags.business_failed) {
      epilogue += `创业这条路，我走得跌跌撞撞。起起落落好几次，最后还是没能站稳脚跟。但我不后悔，至少我试过了。`;
    } else {
      epilogue += `从一无所有到打下这片江山，我吃过的苦只有自己知道。现在回头看，那些吃过的亏、流过的泪，都成了这辈子最宝贵的财富。`;
    }
  } else if (c.flags.early_worker) {
    epilogue += `早早出来闯荡，没读过太多书，全靠一身蛮力和一股子韧劲。这辈子虽然没大富大贵，但也没饿着冻着，对得起自己了。`;
  } else {
    epilogue += `普普通通打了一辈子工。公司换了几家，岗位换了几个，到头来还是个打工人。但日子嘛，不就是这样过的？`;
  }

  // 家庭独白
  epilogue += `\n\n`;
  if (c.flags.married && !c.flags.divorced && !c.flags.widowed) {
    epilogue += `身边这个人，陪我走过了风风雨雨。年轻时吵过闹过，想过分开，但最后还是走过来了。现在想想，能有个人陪你到老，真是上辈子修来的福气。`;
  } else if (c.flags.widowed) {
    epilogue += `老伴走得早，剩下我一个人。有时候夜里醒来，身边空荡荡的，会想起Ta还在的日子。要是Ta还在，该多好。`;
  } else if (c.flags.divorced) {
    epilogue += `那段婚姻没能走到最后。分开的时候很难过，但时间久了也就淡了。各自安好，也是一种结局。`;
  } else if (c.flags.single_forever) {
    epilogue += `这辈子没结婚，一个人过了一辈子。自由是自由，但有时候也会觉得孤单。不过没关系，习惯了就好。`;
  }

  if (c.flags.has_child) {
    epilogue += `孩子们都长大了，各有各的出息。我这辈子最大的成就，就是把他们拉扯大。`;
  } else {
    epilogue += `没有孩子，这辈子少了很多操心的事，但也少了很多天伦之乐。`;
  }

  // 财富独白
  epilogue += `\n\n`;
  if (c.money > 10000) {
    epilogue += `这辈子也算攒下了不少家底。钱这东西，够用就好。儿孙自有儿孙福，我能做的，就是给他们留点念想。`;
  } else if (c.money > 5000) {
    epilogue += `日子过得还算宽裕，想吃的能吃，想穿的能穿。知足常乐，我对现在的生活很满意。`;
  } else if (c.money < -1000) {
    epilogue += `这辈子没攒下什么钱，甚至还欠了一屁股债。钱是个好东西，可惜我这辈子没怎么抓住它。`;
  } else {
    epilogue += `钱不多不少，刚好够用。平平淡淡才是真，我这样安慰自己。`;
  }

  // 属性终值标签
  const attrTags = [];
  if (c.attrs.intelligence >= 70) attrTags.push('学富五车');
  if (c.attrs.constitution >= 70) attrTags.push('体魄强健');
  if (c.attrs.charm >= 70) attrTags.push('风度翩翩');
  if (c.attrs.luck >= 70) attrTags.push('福星高照');
  if (c.attrs.willpower >= 70) attrTags.push('意志坚定');
  if (c.attrs.comprehension >= 70) attrTags.push('悟性超凡');
  if (c.attrs.intelligence < 30) attrTags.push('资质平庸');
  if (c.attrs.constitution < 30) attrTags.push('体弱多病');
  if (c.attrs.charm < 30) attrTags.push('木讷寡言');
  tags.push(...attrTags.slice(0, 3));
  if (c.traits.some(t => t.id === 'gambler')) tags.push('沾染恶习');
  if (c.traits.some(t => t.id === 'depressed')) tags.push('郁郁寡欢');
  if (c.traits.some(t => t.id === 'well_read')) tags.push('腹有诗书');
  if (c.traits.some(t => t.id === 'well_connected')) tags.push('人脉广阔');
  if (c.traits.some(t => t.id === 'resilient')) tags.push('百折不挠');
  if (c.traits.some(t => t.id === 'wise')) tags.push('大器晚成');
  if (c.flags.married && !c.flags.divorced) tags.push('白头偕老');
  if (c.flags.has_child) tags.push('儿孙绕膝');
  if (c.flags.owned_house) tags.push('安居乐业');
  if (c.flags.entrepreneur) tags.push('白手起家');

  // 职业标签
  if (c.flags.civil_servant) tags.push('仕途通达');
  if (c.flags.senior_position) tags.push('职场精英');
  if (c.flags.early_worker) tags.push('早早入世');
  if (c.flags.retired) tags.push('功成身退');
  if (c.flags.business_failed) tags.push('商海沉浮');

  // 家庭标签
  if (c.flags.widowed) tags.push('孤独终老');
  if (c.flags.divorced) tags.push('半路分飞');
  if (c.flags.living_with_children) tags.push('含饴弄孙');
  if (c.flags.pet_companion) tags.push('与猫为伴');
  if (c.flags.single_forever) tags.push('孑然一身');

  // 财富标签
  if (c.money > 10000) tags.push('富贵荣华');
  if (c.money > 5000) tags.push('衣食无忧');
  if (c.money < -1000) tags.push('穷困潦倒');

  // 墓志铭
  let epitaph;
  if (c.mood > 30 && c.health > 50) epitaph = '这一生，总的来说，不算白来。';
  else if (c.mood < -30) epitaph = '若能重来，不知是否会选另一条路。';
  else if (c.age < 30) epitaph = '人生方才开始，便已落幕。';
  else if (c.age >= 75) epitaph = '岁月悠长，此生无憾。';
  else epitaph = '平凡的一生，也有自己的回响。';

  return { preface, chapters, epilogue, tags, epitaph };
}

// ==================== 持久化 ====================
const STORE_KEY = 'life_sim_codex';
function loadCodex() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE_KEY));
    if (raw && typeof raw === 'object') {
      if (!Array.isArray(raw.endings)) raw.endings = [];
      if (!Array.isArray(raw.traitsSeen)) raw.traitsSeen = [];
      if (!Array.isArray(raw.fatesSeen)) raw.fatesSeen = [];
      if (!Array.isArray(raw.eventsSeen)) raw.eventsSeen = [];
      if (typeof raw.totalRuns !== 'number') raw.totalRuns = 0;
      return raw;
    }
  } catch {}
  return { endings:[], traitsSeen:[], fatesSeen:[], eventsSeen:[], totalRuns:0 };
}
function saveCodex(codex) { try { localStorage.setItem(STORE_KEY, JSON.stringify(codex)); } catch {} }
function recordEnding(character, ending) {
  try {
    const codex = loadCodex();
    const eventIds = [...new Set(character.timeline?.map(e => e.eventId) || [])];
    codex.endings.push({
      runId:Date.now().toString(36), name:character.name, finalAge:character.age,
      tags:ending.tags || [], epitaph:ending.epitaph || '', fateTier:character.fateTier,
      fateName:character.fateName, timestamp:Date.now(),
      preface:ending.preface || '', chapters:ending.chapters || [], epilogue:ending.epilogue || '',
      deathReason:character.deathReason,
      attrs:character.attrs, health:character.health, mood:character.mood, money:character.money,
    });
    codex.totalRuns = (codex.totalRuns || 0) + 1;
    for (const t of (character.traits || [])) if (!codex.traitsSeen.includes(t.id)) codex.traitsSeen.push(t.id);
    if (character.fateTier && !codex.fatesSeen.includes(character.fateTier)) codex.fatesSeen.push(character.fateTier);
    for (const eid of eventIds) if (!codex.eventsSeen.includes(eid)) codex.eventsSeen.push(eid);
    saveCodex(codex);
  } catch (e) {
    console.error('recordEnding failed:', e);
  }
}

// ==================== 渲染层 ====================
function render() {
  const app = document.getElementById('app');
  if (state.page === 'start') { app.innerHTML = renderStart(); bindStart(); }
  else if (state.page === 'game') { app.innerHTML = renderGame(); bindGame(); }
  else if (state.page === 'ending') { app.innerHTML = renderEnding(); bindEnding(); }
  else if (state.page === 'codex') { app.innerHTML = renderCodex(); bindCodex(); }
  else if (state.page === 'memoir') { app.innerHTML = renderMemoir(); bindMemoir(); }

function bindGame() {
  if (state.currentOutcome) {
    document.getElementById('continueBtn').onclick = () => { state.currentOutcome = null; nextEvent(); };
  } else if (state.currentEvent.passive) {
    document.getElementById('passiveContinueBtn').onclick = () => {
      // passive 事件：直接应用默认 outcome（若有），然后进入下一事件
      const ev = state.currentEvent;
      // 特殊处理：最后的日子事件直接触发死亡
      if (ev.id === 'final_days') {
        if (ev.passiveOutcome) {
          applyOutcome(state.character, ev.passiveOutcome, ev, { id:'_passive', text:'' }, state.rng);
        }
        triggerDeath('寿终正寝');
        return;
      }
      if (ev.passiveOutcome) {
        applyOutcome(state.character, ev.passiveOutcome, ev, { id:'_passive', text:'' }, state.rng);
      } else {
        // 无 outcome 的纯叙事：仅推进年龄
        const adv = ev.ageAdvance || defaultAgeAdvance(state.character.age);
        state.character.age += adv;
        state.character.stats.eventCount += 1;
        state.character.stats.ageReached = state.character.age;
        if (ev.once) state.character.flags[ev.id + '_done'] = true;
      }
      nextEvent();
    };
  } else {
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        btn.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
        btn.style.setProperty('--my', (e.clientY - rect.top) + 'px');
      });
      btn.addEventListener('click', () => {
        const choiceId = btn.dataset.choice;
        // 从动态 choices 中查找（支持函数形式）
        const choices = getEventChoices(state.currentEvent, state.character);
        const choice = choices.find(c => c.id === choiceId);
        if (choice) makeChoice(choice);
      });
    });
  }
}
function makeChoice(choice) {
  const c = state.character;
  // 记录变化前的状态
  const before = {
    attrs: { ...c.attrs },
    health: c.health,
    mood: c.mood,
    money: c.money,
    traits: c.traits.map(t => t.id),
  };
  const result = resolveChoice(c, state.currentEvent, choice, state.rng);
  applyOutcome(c, result.outcome, state.currentEvent, choice, state.rng);
  // 计算变化
  const changes = [];
  for (const k of Object.keys(c.attrs)) {
    const diff = c.attrs[k] - before.attrs[k];
    if (diff !== 0) changes.push({ type:'attr', key:k, value:diff });
  }
  const hDiff = c.health - before.health;
  if (hDiff !== 0 && !isNaN(hDiff)) changes.push({ type:'health', value:hDiff });
  const mDiff = c.mood - before.mood;
  if (mDiff !== 0) changes.push({ type:'mood', value:mDiff });
  const moDiff = c.money - before.money;
  if (moDiff !== 0) changes.push({ type:'money', value:moDiff });
  const eDiff = c.energy - before.energy;
  if (eDiff !== 0) changes.push({ type:'energy', value:eDiff });
  const newTraits = c.traits.filter(t => !before.traits.includes(t.id)).map(t => ({ type:'trait_add', id:t.id, name:t.name }));
  changes.push(...newTraits);
  const removedTraits = before.traits.filter(id => !c.traits.some(t => t.id === id));
  for (const id of removedTraits) {
    const trait = TRAITS[id];
    if (trait) changes.push({ type:'trait_remove', id, name:trait.name });
  }
  result.changes = changes;
  // 生成失败原因（如果有 check）
  if (result.resultTag === 'failure' || result.resultTag === 'crit-failure') {
    result.failureReason = generateFailureReason(c, state.currentEvent, choice, result);
  } else if (result.resultTag === 'success' || result.resultTag === 'crit-success') {
    result.successReason = generateSuccessReason(c, state.currentEvent, choice, result);
  }
  state.currentOutcome = result;
  render();
}
function nextEvent() {
  const death = checkDeath(state.character);
  if (death.dead) { triggerDeath(death.reason); return; }
  const ev = pickEvent(state.character, state.rng);
  if (!ev) { triggerDeath('寿终正寝'); return; }
  state.currentEvent = ev;
  render();
}
function triggerDeath(reason) {
  state.character.alive = false;
  state.character.deathReason = reason;
  const overlay = document.getElementById('dyingOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    try {
      const ending = generateEnding(state.character);
      if (typeof recordEnding === 'function') {
        recordEnding(state.character, ending);
      }
      state.ending = ending;
      state.page = 'ending';
      overlay.classList.remove('active');
      render();
    } catch (e) {
      console.error('Failed to generate ending:', e);
      state.ending = { error: e.message, stack: e.stack };
      state.page = 'ending';
      overlay.classList.remove('active');
      render();
    }
  }, 1800);
}

  const c = state.character, e = state.ending;
  if (!e || e.error) {

  const attrHtml = `<div class="memoir-attrs"><p>终值：${attrSummary} · 健康:${c.health} · 心情:${c.mood} · 金钱:${c.money}</p></div>`;

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split('');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n];
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n];
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

function renderCodex() {

  const fateProgress = Math.round(codex.fatesSeen.length / totalFates * 100);
  
  const rarityColors = { common:'#8b8b8b', uncommon:'#4a7c59', rare:'#4a6fa5', legendary:'#c9a961' };

    card.onclick = () => {
      const runId = card.dataset.runid;
      const codex = loadCodex();
      const ending = codex.endings.find(e => e.runId === runId);
      if (ending) {
        state.memoirEnding = ending;
        state.page = 'memoir';
        render();
      }
    };
  });
}

function renderMemoir() {
  const e = state.memoirEnding;
  const tagsHtml = e.tags.map(t => `<span class="ending-tag">${t}</span>`).join('');
  const prefaceHtml = `<div class="memoir-preface">${e.preface.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>`;
  const chaptersHtml = e.chapters.map(ch => {
    const parasHtml = ch.paragraphs.map(p => {
      return p.split('\n\n').map(part => `<p class="memoir-para">${part}</p>`).join('');
    }).join('');
    return `<div class="memoir-chapter">
      <h2 class="chapter-title">—— ${ch.stage} ——</h2>
      ${parasHtml}
    </div>`;
  }).join('');
  const epilogueHtml = `<div class="memoir-epilogue">${e.epilogue.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>`;
  const attrSummary = Object.entries(e.attrs).map(([k, v]) => `${ATTR_NAMES[k] || k}: ${v}`).join(' · ');
  const attrHtml = `<div class="memoir-attrs"><p>终值：${attrSummary} · 健康:${e.health} · 心情:${e.mood} · 金钱:${e.money}</p></div>`;
  return `
    <div class="ending-page">
      <h1 class="ending-title">${e.name} 传</h1>
      <p class="ending-subtitle">享年 ${e.finalAge} · ${e.deathReason}</p>
      <div class="ending-tags">${tagsHtml}</div>
      <div class="memoir-scroll">
        ${prefaceHtml}
        <div class="chapter-divider">❖</div>
        ${chaptersHtml}
        <div class="chapter-divider">❖</div>
        ${epilogueHtml}
        ${attrHtml}
        <p class="epitaph">「 ${e.epitaph || '人生如梦，一樽还酹江月'} 」</p>
      </div>
      <div class="ending-actions">
        <button class="action-btn" data-act="back">返回图鉴</button>
        <button class="action-btn" data-act="home">返回首页</button>
      </div>
    </div>
  `;
}
function bindMemoir() {
  document.querySelector('[data-act="back"]').onclick = () => { state.page = 'codex'; render(); };
  document.querySelector('[data-act="home"]').onclick = () => { state.page = 'start'; render(); };
}

// ==================== 入口 ====================
render();
</script>
</body>
</html>
